# Cloud Run Service Configuration
# Deploy with: gcloud run deploy --source .

service: sist-vendas-uber
region: us-central1
platform: managed

env:
  - name: ENVIRONMENT
    value: production
  - name: FIRESTORE_PROJECT_ID
    value: your-project-id
  - name: FIRESTORE_CREDENTIALS_PATH
    value: /secrets/firestore-credentials.json
  - name: LOG_LEVEL
    value: INFO

secrets:
  - key: firestore-credentials.json
    name: firestore-credentials
    path: /secrets/firestore-credentials.json

resources:
  limits:
    cpu: 1
    memory: 512Mi
  cpu: 1
  memory: 512Mi

scaling:
  minInstances: 1
  maxInstances: 10

ingress: all
traffic:
  - percent: 100
