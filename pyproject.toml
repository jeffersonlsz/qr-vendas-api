# Ruff Configuration
# Fast and comprehensive Python linter

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "ARG001", # unused function argument (common in FastAPI)
    "ARG002", # unused method argument
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401", "F403"]  # Allow wildcard imports in __init__ files
"src/main.py" = ["E402"]  # Allow imports after variable assignments
"tests/*" = ["ARG", "B008"]  # Relax rules for tests

[tool.ruff.isort]
known-first-party = ["src"]
known-third-party = ["fastapi", "pydantic", "google", "firebase"]
